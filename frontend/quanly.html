<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý nhân sự</title>
    <script src="core.js"></script>
    <link rel="stylesheet" href="main.css" />
    <style>
      /* 1. Reset và Font chữ */
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background-color: #f8f9fa;
        margin: 0;
        padding: 40px;
        color: #333;
      }

      /* 2. Tiêu đề */
      h1 {
        color: #2c3e50;
        text-align: center;
        font-size: 28px;
        margin-bottom: 5px;
      }

      h2 {
        color: #7f8c8d;
        text-align: center;
        font-size: 18px;
        font-weight: 400;
        margin-bottom: 30px;
      }

      /* 3. Thanh quản lý (Nút bấm) */
      .quanlybar {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 25px;
      }

      .quanlybar button {
        background-color: #007bff;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        transition: all 0.3s ease;
      }

      .quanlybar button:hover {
        background-color: #0056b3;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }

      .quanlybar button a {
        color: white;
        text-decoration: none;
        font-weight: 600;
      }

      /* 4. Định dạng Bảng dữ liệu */
      #list_user {
        width: 100%;
        max-width: 1000px;
        margin: 0 auto;
        border-collapse: collapse; /* Bỏ khoảng cách giữa các viền */
        background: white;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        border-radius: 8px;
        overflow: hidden; /* Để bo góc bảng */
        border: none;
      }

      /* Header của bảng */
      #list_user th {
        background-color: #343a40;
        color: white;
        padding: 15px;
        text-align: left;
        text-transform: uppercase;
        font-size: 14px;
        letter-spacing: 0.5px;
      }

      /* Các ô dữ liệu */
      #list_user td {
        padding: 12px 15px;
        border-bottom: 1px solid #eee;
        vertical-align: middle;
      }

      /* Hiệu ứng khi di chuột qua từng dòng */
      #list_user tr:hover {
        background-color: #f1f4f9;
      }

      /* Ảnh Avatar trong bảng */
      #list_user img {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #ddd;
      }

      /* 5. Định dạng các nút chức năng (Sửa/Xóa) bên trong bảng */
      #list_user td button {
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        border: 1px solid #ddd;
      }

      /* Tùy chỉnh màu sắc riêng cho nút Xóa/Sửa nếu cần */
      #list_user td:nth-last-child(1) button {
        background-color: #ff4d4d;
        color: white;
        border: none;
      } /* Nút cuối */
      #list_user td:nth-last-child(2) button {
        background-color: #ffc107;
        color: #212529;
        border: none;
      } /* Nút kế cuối */
    </style>
  </head>
  <body onload="loadListUser()">
    <h1>QUẢN LÝ NHÂN SỰ</h1>
    <h2>DANH SÁCH NHÂN SỰ</h2>
    <div class="quanlybar">
      <button><a href="adduser.html">Thêm nhân sự</a></button>
      <button><a href="index.html">Trang chủ</a></button>
    </div>
    <table id="list_user" border="1">
      <th>Avatar</th>
      <th>Tên</th>
      <th>Email</th>
      <th>Đơn vị</th>
      <th></th>
      <th></th>
    </table>
  </body>
</html>
