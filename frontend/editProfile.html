<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Sửa thông tin nhân sự</title>
  </head>
  <script src="core.js"></script>
  <body onload="loadUserToEdit()">
    <h2>Sửa thông tin nhân sự</h2>

    <form
      id="editForm"
      enctype="multipart/form-data"
      onsubmit="updateUser(event)"
    >
      <div>
        <label>Email:</label>
        <input type="email" id="email" name="email" required />
      </div>
      <div>
        <label>Tên:</label>
        <input type="text" id="name" name="hoten" required />
      </div>
      <div>
        <label>Giới tính:</label>
        Nam
        <input type="radio" name="gioitinh" value="male" />
        Nữ
        <input type="radio" name="gioitinh" value="female" />
      </div>
      <div>
        <label>Trình độ:</label>
        <select id="trinhdo" name="trinhdo">
          <option value="thacsi">Thạc sĩ</option>
          <option value="tiensi">Tiến sĩ</option>
          <option value="phogiaosu">Phó giáo sư</option>
          <option value="giaosu">Giáo sư</option>
        </select>
      </div>
      <div>
        <label>Đơn vị:</label>
        <input type="text" id="donvi" name="donvi" />
      </div>
      <div>
        <label>Học hàm:</label>
        <input type="text" id="hocham" name="hocham" />
      </div>
      <div>
        <label>Avatar:</label>
        <input type="file" name="file" />
      </div>
      <div>
        <button type="submit">Cập nhật</button>
        <button><a href="quanly.html">Hủy</a></button>
      </div>
    </form>
  </body>
</html>
